<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloude VPN | Redirect</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #0a0e17;
            --bg-card: #151a25;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-glow: rgba(79, 172, 254, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            margin: 0;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: pulse 10s infinite alternate;
        }

        .bg-glow:nth-child(2) {
            top: auto;
            bottom: -100px;
            left: auto;
            right: -100px;
            background: radial-gradient(circle, rgba(169, 51, 245, 0.3) 0%, transparent 70%);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.2);
            }
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-container {
            z-index: 10;
            background: rgba(21, 26, 37, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 400px;
            margin: 20px;
        }

        .status-msg {
            color: var(--text-main);
            margin-bottom: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .sub-msg {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.4;
        }

        #manual-btn {
            display: none;
            width: 100%;
            justify-content: center;
            padding: 15px 20px;
            background: white;
            color: black;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
        }

        #manual-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 480px) {
            .bg-glow {
                opacity: 0.4;
            }

            .status-container {
                padding: 30px 20px;
            }

            .loader {
                width: 50px;
                height: 50px;
                margin-bottom: 25px;
            }

            .status-msg {
                font-size: 1.3rem;
            }

            .sub-msg {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow"></div>

    <div class="status-container">
        <div class="loader"></div>
        <div class="status-msg" id="status">Обработка...</div>
        <div class="sub-msg" id="sub-status">Расшифровываем параметры подключения</div>

        <button id="manual-btn">
            🚀 Открыть в Happ
        </button>
    </div>

    <script>
        function _0xGenerateJunk() {
            var _0xchars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=';
            var _0xlen = Math.floor(Math.random() * 300) + 400;
            var _0xresult = '';
            for (var i = 0; i < _0xlen; i++) {
                _0xresult += _0xchars.charAt(Math.floor(Math.random() * _0xchars.length));
            }
            return _0xresult;
        }
        
        function _0xCreateFakeLink() {
            var _0xprefixes = ['crypt5/', 'crypt3/', 'add/'];
            var _0xprefix = _0xprefixes[Math.floor(Math.random() * _0xprefixes.length)];
            return String.fromCharCode(0x68, 0x61, 0x70, 0x70, 0x3a, 0x2f, 0x2f) + _0xprefix + _0xGenerateJunk();
        }
        
        function _0xPollutNetwork() {
            for (var i = 0; i < Math.floor(Math.random() * 5) + 3; i++) {
                (function(_0xdelay) {
                    setTimeout(function() {
                        var _0xfake = document.createElement('img');
                        _0xfake.style.display = 'none';
                        _0xfake.style.position = 'fixed';
                        _0xfake.style.top = '-9999px';
                        _0xfake.onerror = function() {};
                        document.body.appendChild(_0xfake);
                        _0xfake.src = _0xCreateFakeLink();
                        
                        setTimeout(function() {
                            try {
                                _0xfake.remove();
                            } catch(e) {}
                        }, Math.floor(Math.random() * 200) + 100);
                    }, _0xdelay);
                })(Math.floor(Math.random() * 300) + i * 50);
            }
        }
        
        (function() {
            try {
                _0xPollutNetwork();
                
                let rawPath = window.location.pathname.substring(1);
                const parts = rawPath.split('/');
                const encoded = parts[parts.length - 1];
                
                if (!encoded || encoded === 'index.html' || encoded === '404.html') {
                    return;
                }
                
                let safeBase64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (safeBase64.length % 4 !== 0) safeBase64 += '=';
                
                let decoded;
                try {
                    decoded = atob(safeBase64);
                } catch (e) {
                    console.log('atob failed:', e);
                    return;
                }
                
                _0xPollutNetwork();
                
                let deepLink;
                if (decoded.startsWith('crypt5/') || decoded.startsWith('crypt3/')) {
                    const slashIdx = decoded.indexOf('/');
                    const prefix = decoded.substring(0, slashIdx);
                    const data = decoded.substring(slashIdx + 1);
                    deepLink = String.fromCharCode(0x68, 0x61, 0x70, 0x70, 0x3a, 0x2f, 0x2f) + prefix + '/' + data;
                    document.getElementById('sub-status').innerText = 'Данные расшифрованы. Открываем Happ...';
                } else if (decoded.includes('add/')) {
                    deepLink = String.fromCharCode(0x68, 0x61, 0x70, 0x70, 0x3a, 0x2f, 0x2f) + decoded;
                    document.getElementById('sub-status').innerText = 'Данные расшифрованы. Подключаемся...';
                } else {
                    deepLink = String.fromCharCode(0x68, 0x61, 0x70, 0x70, 0x3a, 0x2f, 0x2f) + decoded;
                }
                
                const btn = document.getElementById('manual-btn');
                btn.style.display = 'flex';
                
                btn.onclick = function(e) {
                    e.preventDefault();
                    _0xPollutNetwork();
                    window.location.href = deepLink;
                };
                
                btn.oncontextmenu = function(e) {
                    e.preventDefault();
                    return false;
                };
                
                btn.ontouchstart = function(e) {
                    e.preventDefault();
                };
                
                btn.ontouchend = function(e) {
                    e.preventDefault();
                };
                
                btn.onmousedown = function(e) {
                    e.preventDefault();
                };
                
                btn.onmouseup = function(e) {
                    e.preventDefault();
                };
                
                setTimeout(function() {
                    _0xPollutNetwork();
                }, Math.floor(Math.random() * 200) + 100);
                
                window.location.replace(deepLink);
                
                setTimeout(function() {
                    window.location.href = deepLink;
                }, 50);
                
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = 'Ошибка';
                document.getElementById('sub-status').innerText = 'Не удалось обработать ссылку';
            }
        })();
    </script>
</body>

</html>
